<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>好客山东·齐鲁胜景｜山东16地市代表性景点地图</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.32/esri/themes/light/main.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #viewDiv { width: 100%; height: 100%; }
        .left-panel {
            position: absolute; top: 20px; left: 20px; width: 280px;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
            border-radius: 20px; padding: 12px 15px; z-index: 1000;
            color: white; border-left: 4px solid #FFC107;
        }
        .left-panel h1 { font-size: 1.3rem; margin-bottom: 5px; }
        .attractions-list { max-height: 280px; overflow-y: auto; }
        .list-item {
            display: inline-block; width: calc(50% - 6px); margin: 4px 3px;
            background: rgba(255,255,255,0.1); border-radius: 20px;
            padding: 4px 10px; cursor: pointer; text-align: center; font-size: 11px;
        }
        .list-item:hover { background: #FFC107; color: #333; }
        .search-panel {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            padding: 6px 15px; border-radius: 50px; z-index: 1001;
            display: flex; gap: 8px;
        }
        .search-panel input { padding: 6px 12px; border-radius: 30px; border: none; width: 200px; }
        .search-panel button, .action-btn {
            padding: 6px 14px; border-radius: 30px; border: none;
            background: #FFC107; font-weight: bold; cursor: pointer;
        }
        .button-group { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .tooltip-note {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.5); border-radius: 20px;
            padding: 5px 12px; color: white; font-size: 11px;
        }
        @media (max-width: 800px) { .left-panel { width: 260px; } .search-panel input { width: 140px; } }
    </style>
    <script src="https://js.arcgis.com/4.32/"></script>
    <script>
        require([
            "esri/Map", "esri/views/MapView", "esri/layers/GraphicsLayer",
            "esri/Graphic", "esri/geometry/Point", "esri/symbols/SimpleMarkerSymbol",
            "esri/PopupTemplate", "esri/widgets/BasemapToggle", "esri/widgets/DistanceMeasurement2D"
        ], function(Map, MapView, GraphicsLayer, Graphic, Point, SimpleMarkerSymbol, PopupTemplate, BasemapToggle, DistanceMeasurement2D) {

            const map = new Map({ basemap: "arcgis/streets" });
            const view = new MapView({
                container: "viewDiv", map: map,
                center: [118.0, 36.5], zoom: 7.5,
                constraints: { minZoom: 7, maxZoom: 12 }
            });

            // 景点数据（共16个，描述精简但完整）
            const attractions = [
                { city: "济南", name: "趵突泉", lat: 36.6609, lon: 117.0072, desc: "趵突泉位居济南七十二名泉之首，被誉为天下第一泉。乾隆皇帝南巡时曾册封为天下第一泉。公园内还有李清照纪念堂、万竹园等古迹，是济南泉城文化的核心象征。" },
                { city: "青岛", name: "栈桥", lat: 36.0609, lon: 120.3240, desc: "青岛栈桥始建于1892年，是青岛最早的军事专用人工码头，如今已成为青岛的标志性建筑。栈桥全长440米，尽头是双层飞檐八角亭阁回澜阁。漫步桥上，可欣赏海鸥翔集、碧波荡漾，是游客必到的打卡地。" },
                { city: "淄博", name: "周村古商城", lat: 36.7872, lon: 117.8671, desc: "周村古商城素有天下第一村之称，是明清时期北方重要的商业重镇，也是鲁商文化的发源地。古街两侧保留着大量明清建筑，瑞蚨祥、大染坊等老字号仍可见证当年的繁华。" },
                { city: "枣庄", name: "台儿庄古城", lat: 34.5584, lon: 117.7348, desc: "台儿庄古城坐落于京杭大运河畔，被世界旅游组织称为活着的古运河。城内拥有3公里古运河河道，15公里水街水巷，是中国国内规模最大的水乡古城。夜晚灯火璀璨，船妹子摇橹歌声悠扬。" },
                { city: "东营", name: "黄河口生态旅游区", lat: 37.7650, lon: 118.9812, desc: "黄河口生态区位于黄河入海口，这里有世界上最年轻、最完整的湿地生态系统。可以观赏到黄蓝交汇的奇观，秋季芦花飞雪，数百万只候鸟在此栖息，被称为鸟类国际机场。" },
                { city: "烟台", name: "蓬莱阁", lat: 37.8139, lon: 120.7512, desc: "蓬莱阁始建于北宋，坐落在丹崖山巅，与黄鹤楼、岳阳楼、滕王阁并称中国古代四大名楼。因八仙过海的传说和海市蜃楼的奇观闻名海内外，感受人间仙境的魅力。" },
                { city: "潍坊", name: "青州古城", lat: 36.6853, lon: 118.4801, desc: "青州为古九州之一，有7000余年的发展史和5000余年的文明史。古城内保存有偶园、阜财门、昭德古街等大量明清建筑，可以品味原汁原味的北方古城生活。" },
                { city: "济宁", name: "曲阜三孔", lat: 35.5967, lon: 116.9932, desc: "曲阜三孔包括孔庙、孔府、孔林，是祭祀孔子及孔子后代居住、安息的建筑群。1994年被列入世界文化遗产。这里是儒家文化的圣地，影响深远。" },
                { city: "泰安", name: "泰山", lat: 36.2520, lon: 117.1131, desc: "泰山有五岳独尊之称，是首个世界文化与自然双重遗产。古代帝王如秦始皇、汉武帝等均在此举行封禅大典。日出云海、晚霞夕照、黄河金带是泰山四大奇观。" },
                { city: "威海", name: "刘公岛", lat: 37.5010, lon: 122.1926, desc: "刘公岛是甲午战争的见证者，岛上保留着北洋水师提督署、水师学堂、丁汝昌寓所等历史建筑。岛上森林覆盖率达87%，有海上仙山的美誉。" },
                { city: "日照", name: "万平口", lat: 35.4147, lon: 119.5638, desc: "万平口海滨风景区是日照的城市会客厅，拥有5公里优质沙滩，沙细水清，是蓝天、碧海、金沙滩的代表。清晨观海上日出，景色壮阔，令人心旷神怡。" },
                { city: "临沂", name: "沂蒙山", lat: 35.5705, lon: 117.9426, desc: "沂蒙山是世界地质公园，国家5A级景区，被誉为天然氧吧。这里不仅是红色革命老区（沂蒙精神发源地），还拥有中国最长的森林悬崖栈道。" },
                { city: "德州", name: "董子园", lat: 37.4542, lon: 116.3557, desc: "董子园是为纪念西汉大儒董仲舒而建，董仲舒提出罢黜百家，独尊儒术，对中华文化影响深远。景区以儒家文化为主题，是感受国学文化的好去处。" },
                { city: "聊城", name: "东昌湖", lat: 36.4600, lon: 115.9676, desc: "东昌湖又名胭脂湖，水域面积约6.3平方公里，是北方最大的城市内陆湖泊，有北方西湖之称。形成城中有湖，湖中有城的独特格局。" },
                { city: "滨州", name: "魏集古村落", lat: 37.1556, lon: 117.6158, desc: "魏集古村落位于黄河岸边，是一处复原明清鲁北民居风貌的古镇。景区内建有手工作坊街、风味小吃街，可体验传统豆腐、酿酒、织布等工艺。" },
                { city: "菏泽", name: "曹州牡丹园", lat: 35.2298, lon: 115.4667, desc: "曹州牡丹园是世界面积最大、品种最多的牡丹园，有牡丹品种1200余个。每年4月中旬至5月上旬为牡丹花期，国色天香，菏泽因此被誉为中国牡丹之都。" }
            ];

            const layer = new GraphicsLayer();
            map.add(layer);
            const items = [];

            const popupTemplate = new PopupTemplate({
                title: "{city} · {name}",
                content: `<div style="max-width:280px;"><p><strong>景点特色</strong><br>{desc}</p><p>📍 {lon}°E, {lat}°N</p></div>`
            });

            attractions.forEach(spot => {
                const point = new Point({ longitude: spot.lon, latitude: spot.lat });
                const symbol = new SimpleMarkerSymbol({
                    color: [255, 69, 58, 0.9], size: 14,
                    outline: { color: [255, 193, 7, 1], width: 2 }
                });
                const graphic = new Graphic({
                    geometry: point, symbol: symbol,
                    attributes: { city: spot.city, name: spot.name, desc: spot.desc, lat: spot.lat.toFixed(4), lon: spot.lon.toFixed(4) },
                    popupTemplate: popupTemplate
                });
                layer.add(graphic);
                items.push({ graphic, city: spot.city, name: spot.name, lat: spot.lat, lon: spot.lon });
            });

            // 底图切换
            const toggle = new BasemapToggle({ view: view, nextBasemap: "satellite" });
            view.ui.add(toggle, "bottom-right");

            // 测距功能
            let measureWidget = null;
            const measureBtn = document.getElementById("measureBtn");
            function toggleMeasure() {
                if (measureWidget) {
                    measureWidget.destroy();
                    measureWidget = null;
                    measureBtn.classList.remove("active-measure");
                } else {
                    measureWidget = new DistanceMeasurement2D({ view: view, unit: "metric" });
                    view.ui.add(measureWidget, "top-right");
                    measureWidget.start();
                    measureBtn.classList.add("active-measure");
                    measureWidget.watch("state", (val) => {
                        if (val === "ready" && measureWidget && !measureWidget.active) {
                            measureBtn.classList.remove("active-measure");
                            measureWidget.destroy();
                            measureWidget = null;
                        }
                    });
                }
            }
            measureBtn.addEventListener("click", toggleMeasure);

            // 搜索
            const searchInput = document.getElementById("searchInput");
            const searchBtn = document.getElementById("searchBtn");
            function search() {
                let kw = searchInput.value.trim();
                if (!kw) { alert("请输入城市名或景点名"); return; }
                let matched = items.find(i => i.name === kw || i.city === kw);
                if (!matched) matched = items.find(i => i.name.includes(kw) || i.city.includes(kw));
                if (matched) {
                    view.goTo({ center: [matched.lon, matched.lat], zoom: 11 })
                        .then(() => view.popup.open({ features: [matched.graphic] }));
                } else { alert("未找到"); }
            }
            searchBtn.onclick = search;
            searchInput.onkeypress = e => { if (e.key === "Enter") search(); };

            // 随机
            document.getElementById("randomBtn").onclick = () => {
                const idx = Math.floor(Math.random() * items.length);
                const item = items[idx];
                view.goTo({ center: [item.lon, item.lat], zoom: 11 })
                    .then(() => view.popup.open({ features: [item.graphic] }));
            };

            // 左侧列表
            const container = document.getElementById("attractionsList");
            items.forEach(item => {
                const div = document.createElement("div");
                div.className = "list-item";
                div.textContent = `${item.city}·${item.name}`;
                div.onclick = () => {
                    view.goTo({ center: [item.lon, item.lat], zoom: 11 })
                        .then(() => view.popup.open({ features: [item.graphic] }));
                };
                container.appendChild(div);
            });

            console.log("地图加载完成，测距功能可用");
        });
    </script>
</head>
<body>
    <div id="viewDiv"></div>
    <div class="left-panel">
        <h1>🏔️ 好客山东 · 齐鲁胜景</h1>
        <div class="attractions-list" id="attractionsList"></div>
    </div>
    <div class="search-panel">
        <input type="text" id="searchInput" placeholder="搜索城市或景点" autocomplete="off">
        <button id="searchBtn">🔍 搜索</button>
    </div>
    <div class="button-group">
        <button id="randomBtn" class="action-btn">🎲 随机景点</button>
        <button id="measureBtn" class="action-btn">📏 测距</button>
    </div>
    <div class="tooltip-note">💡 提示：点击红色标记查看详情 | 支持搜索/随机/测距 | 右下角可切换底图</div>
</body>
</html>
